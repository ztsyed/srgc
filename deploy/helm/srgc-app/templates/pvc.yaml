apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "srgc.fullname" . }}-data
  labels: {{- include "srgc.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storage.storageClassName | quote }}
  resources:
    requests:
      storage: {{ .Values.storage.size | quote }}
