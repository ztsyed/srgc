apiVersion: v1
kind: Secret
metadata:
  name: {{ include "srgc.fullname" . }}
  labels: {{- include "srgc.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_SECRET: {{ required "secrets.AUTH_SECRET is required" .Values.secrets.AUTH_SECRET | quote }}
  AUTH_GOOGLE_ID: {{ required "secrets.AUTH_GOOGLE_ID is required" .Values.secrets.AUTH_GOOGLE_ID | quote }}
  AUTH_GOOGLE_SECRET: {{ required "secrets.AUTH_GOOGLE_SECRET is required" .Values.secrets.AUTH_GOOGLE_SECRET | quote }}
  ANTHROPIC_API_KEY: {{ required "secrets.ANTHROPIC_API_KEY is required" .Values.secrets.ANTHROPIC_API_KEY | quote }}
  ALLOWED_EMAILS: {{ required "secrets.ALLOWED_EMAILS is required (comma-separated emails)" .Values.secrets.ALLOWED_EMAILS | quote }}
{{- /* CRON_SECRET: keep the existing value across `helm upgrade`s so the */ -}}
{{- /* CronJob's bearer token doesn't rotate. Prefer: explicit value -> */ -}}
{{- /* existing secret in cluster -> fresh random.                         */ -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace (include "srgc.fullname" .)) }}
{{- $prev := "" }}
{{- if and $existing $existing.data (hasKey $existing.data "CRON_SECRET") }}
{{- $prev = (b64dec (index $existing.data "CRON_SECRET")) }}
{{- end }}
  CRON_SECRET: {{ default (default (randAlphaNum 40) $prev) .Values.secrets.CRON_SECRET | quote }}
